<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <meta name="robots" content="noindex">
    <title>404 失落的战场 | 圣彡战国战服</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #2a0c0c;
            font-family: 'Segoe UI', 'Noto Sans CJK SC', 'Microsoft YaHei', '黑体', sans-serif;
            color: #f0e6d0;
            line-height: 1.5;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .error-container {
            max-width: 700px;
            margin: 0 auto;
            background: rgba(20, 8, 8, 0.9);
            border: 1px solid #b87c4f;
            border-radius: 32px;
            box-shadow: 0 0 30px rgba(0,0,0,0.6), inset 0 0 10px rgba(180, 80, 40, 0.3);
            backdrop-filter: blur(2px);
            text-align: center;
            padding: 50px 30px;
        }

        .error-code {
            font-size: 8rem;
            font-weight: bold;
            font-family: monospace;
            text-shadow: 0 0 20px #d43f1f;
            color: #ffb07c;
            line-height: 1;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 20px;
            font-family: 'Noto Serif SC', serif;
            color: #ffdaaa;
            border-bottom: 2px solid #b46b3a;
            display: inline-block;
            padding-bottom: 8px;
        }

        p {
            font-size: 1.1rem;
            margin: 20px 0;
            color: #e5c8a3;
        }

        .home-link {
            display: inline-block;
            background: #2c1c14;
            padding: 12px 32px;
            border-radius: 50px;
            color: #ffdfb3;
            text-decoration: none;
            border: 1px solid #b46b3a;
            transition: 0.2s;
            margin-top: 20px;
            font-weight: bold;
            font-size: 1.1rem;
        }

        .home-link:hover {
            background: #b46b3a;
            color: #1f0f07;
            border-color: #ffd28f;
            transform: scale(1.02);
        }

        .war-sound {
            margin-top: 30px;
            font-size: 0.8rem;
            color: #b67e54;
            letter-spacing: 2px;
        }

        @media (max-width: 600px) {
            .error-code {
                font-size: 5rem;
            }
            h1 {
                font-size: 1.6rem;
            }
            .error-container {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>
<div class="error-container">
    <div class="error-code">404</div>
    <h1>⚔️ 旗帜迷失 · 战场未寻 ⚔️</h1>
    <p>你所寻找的页面，如同远古战场上的消散硝烟，<br>已然不在当前坐标。</p>
    <p>或许它已被移师他处，或从未存在。</p>
    <a href="./index.html" class="home-link">🏯 返回王城首页</a>
    <div class="war-sound">—— 圣彡战国 · 永不陷落 ——</div>
</div>
</body>
</html>
